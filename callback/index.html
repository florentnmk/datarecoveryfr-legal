<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataRecoveryFR — Auth Callback</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
    #code-box { background: #f0f0f0; padding: 15px; border-radius: 6px; 
                word-break: break-all; font-family: monospace; font-size: 14px; }
    h2 { color: #cc0000; }
  </style>
</head>
<body>
  <h2>DataRecoveryFR — Authorization Code</h2>
  <p>Copie le code ci-dessous et colle-le dans le terminal :</p>
  <div id="code-box">Chargement...</div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    document.getElementById("code-box").textContent = code || "Aucun code trouvé dans l'URL";
  </script>
</body>
</html>
